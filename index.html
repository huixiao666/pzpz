/* ====== 存储 & 主题 ====== */
const Storage={get:(k,d=null)=>{try{let v=localStorage.getItem('mediahub_'+k);return v?JSON.parse(v):d;}catch(e){return d;}},set:(k,v)=>{try{localStorage.setItem('mediahub_'+k,JSON.stringify(v));}catch(e){}}};
const ACCENT_MAP={
  apps:'--app-accent',
  chat:'--chat-accent',
  search:'--search-accent',
  tools:'--tool-accent'
};

function switchView(name){
  if(!document.getElementById(name+'View')) return;
  document.querySelectorAll('.section-view').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn, .mob-tab').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.view === name);
  });
  document.getElementById(name+'View').classList.add('active');
  document.documentElement.style.setProperty('--active-accent',`var(${ACCENT_MAP[name]})`);
  Storage.set('currentView',name);
}

let savedView = Storage.get('currentView','apps');
if(savedView==='videos'||savedView==='novels') savedView='apps';
switchView(savedView);

/* ====== 主题切换 ====== */
let isDark=Storage.get('isDark',true);
document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
document.getElementById('themeBtn').innerHTML=isDark?'<i class="fas fa-moon"></i>':'<i class="fas fa-sun"></i>';
document.getElementById('themeBtn').addEventListener('click',()=>{
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('themeBtn').innerHTML=isDark?'<i class="fas fa-moon"></i>':'<i class="fas fa-sun"></i>';
  Storage.set('isDark',isDark);
});

/* ====== 导航栏隐藏 ====== */
const navToggleBtn = document.getElementById('navToggleBtn');
let navHidden = Storage.get('navHidden', false);
function setNavHidden(hidden) {
  if (hidden) {
    document.body.classList.add('nav-hidden');
    navToggleBtn.classList.add('active');
    navToggleBtn.innerHTML = '<i class="fas fa-chevron-down"></i>';
    navToggleBtn.title = '显示导航栏';
  } else {
    document.body.classList.remove('nav-hidden');
    navToggleBtn.classList.remove('active');
    navToggleBtn.innerHTML = '<i class="fas fa-chevron-up"></i>';
    navToggleBtn.title = '隐藏导航栏';
  }
  navHidden = hidden;
  Storage.set('navHidden', hidden);
}
setNavHidden(navHidden);
navToggleBtn.addEventListener('click', () => setNavHidden(!navHidden));

/* ====== 视图切换按钮绑定 ====== */
document.querySelectorAll('.tab-btn, .mob-tab').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.preventDefault();
    const viewName = btn.dataset.view;
    if(viewName) switchView(viewName);
  });
});

/* ====== 应用模块 ====== */
let currentCat='all',searchQuery='',pinnedApps=Storage.get('pinnedApps',[]);
function renderPinnedApps(){
  let scroll=document.getElementById('pinnedScroll'),section=document.getElementById('pinnedSection');
  if(pinnedApps.length===0){section.classList.remove('show');return;}
  section.classList.add('show');
  let pinnedList=APP_DATA.filter(a=>pinnedApps.includes(a.name));
  scroll.innerHTML=pinnedList.map(a=>`<a class="app-pinned-card" href="${a.url}" target="_blank" style="position:relative"><div class="app-icon-wrap" style="background:${a.bg};color:${a.color}"><i class="${a.icon}"></i></div><div class="app-name">${a.name}</div><button class="app-pinned-remove" data-name="${a.name}">✕</button></a>`).join('');
  scroll.querySelectorAll('.app-pinned-remove').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation();e.preventDefault();let name=btn.dataset.name;pinnedApps=pinnedApps.filter(n=>n!==name);Storage.set('pinnedApps',pinnedApps);renderPinnedApps();renderApps();}));
}
function renderApps(){
  let grid=document.getElementById('appsGrid');
  let list=currentCat==='all'?APP_DATA:APP_DATA.filter(a=>a.tag===currentCat);
  if(searchQuery) list=list.filter(a=>a.name.toLowerCase().includes(searchQuery.toLowerCase()));
  grid.innerHTML=list.map(a=>`<a class="app-card" href="${a.url}" target="_blank"><div class="app-icon-wrap" style="background:${a.bg};color:${a.color}"><i class="${a.icon}"></i></div><div class="app-name">${a.name}</div><div class="app-tag">${a.tag}</div><button class="app-pin-star ${pinnedApps.includes(a.name)?'pinned':''}" data-name="${a.name}"><i class="fas fa-star"></i></button></a>`).join('');
  grid.querySelectorAll('.app-pin-star').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation();e.preventDefault();let name=btn.dataset.name;if(pinnedApps.includes(name))pinnedApps=pinnedApps.filter(n=>n!==name);else pinnedApps.push(name);Storage.set('pinnedApps',pinnedApps);renderPinnedApps();renderApps();}));
}
document.getElementById('appCatScroll').addEventListener('click',e=>{let pill=e.target.closest('.app-cat-pill');if(!pill||!pill.dataset.cat)return;document.querySelectorAll('.app-cat-pill').forEach(c=>c.classList.remove('active'));pill.classList.add('active');currentCat=pill.dataset.cat;renderApps();});
let searchInput=document.getElementById('appSearch'),searchClear=document.getElementById('appSearchClear');
searchInput.addEventListener('input',()=>{searchQuery=searchInput.value.trim();searchClear.classList.toggle('visible',searchQuery.length>0);renderApps();});
searchClear.addEventListener('click',()=>{searchInput.value='';searchQuery='';searchClear.classList.remove('visible');renderApps();searchInput.focus();});
renderPinnedApps(); renderApps();

/* ====== 工具模块 ====== */
let curToolCate='all';
function renderTools(){
  let grid=document.getElementById('toolsGrid');
  let list=curToolCate==='all'?TOOL_DATA:TOOL_DATA.filter(t=>t.cate===curToolCate);
  grid.innerHTML=list.map(t=>`<div class="tool-card" style="--tc:${t.color}"><div class="tool-card-header"><div class="tool-icon" style="background:${t.color}"><i class="${t.icon}"></i></div><div class="tool-title">${t.title}</div></div><div class="tool-desc">${t.desc}</div><a class="tool-btn" href="${t.url}" target="_blank"><i class="fas fa-arrow-up-right-from-square"></i> 打开</a></div>`).join('');
}
document.getElementById('toolsCateWrap').addEventListener('click',e=>{
  let btn=e.target.closest('.tools-cate-btn');
  if(!btn) return;
  document.querySelectorAll('.tools-cate-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curToolCate=btn.dataset.cate;
  renderTools();
});
renderTools();
</script>
